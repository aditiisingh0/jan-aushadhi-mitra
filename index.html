<!DOCTYPE html>
<html>
<head>
    <title>Jan Aushadhi Mitra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <img src="modi.jpg" class="modi-img">
        <h1>Jan Aushadhi Mitra</h1>
        <p>Affordable Medicines for Every Indian</p>
    </div>

    <!-- Search Section -->
    <div class="search-box">
        <input type="text" id="medicineInput" placeholder="Enter medicine name">
        <button onclick="searchMedicine()">Search</button>
    </div>

    <!-- Result -->
    <div id="result" class="result-card"></div>

    <!-- Store Locator -->
    <div class="store">
        <h2>Find Jan Aushadhi Store Near You</h2>
        <button onclick="findStore()">Find Store</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
<p>Save Money. Get Quality Medicines. Stay Healthy.</p>
