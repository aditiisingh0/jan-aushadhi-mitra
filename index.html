<!DOCTYPE html>
<html>
<head>
    <title>Jan Aushadhi Mitra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <img src="modi.png" class="modi">
        <div>
            <h1>JAN AUSHADHI MITRA</h1>
            <p>Affordable Medicines for Every Indian</p>
        </div>
    </div>

    <div class="search">
        <input type="text" id="medicineInput" placeholder="Enter Medicine Name">
        <button onclick="searchMedicine()">Search</button>
    </div>

    <div id="result" class="card"></div>

    <div class="store">
        <h2>Find Jan Aushadhi Store Near You</h2>
        <button onclick="findStore()">Find Store</button>
    </div>

    <script src="app.js"></script>
    <div class="footer">
    <p>Government of India Initiative - Jan Aushadhi Scheme</p>
</div>
</body>
</html>
